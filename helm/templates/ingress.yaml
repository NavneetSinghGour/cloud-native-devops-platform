apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ .Chart.Name }}

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: {{ .Chart.Name }}
                port:
                  number: {{ .Values.service.port }}
