---
- name: Copy OpenTelemetry Collector values file
  copy:
    src: values.yaml
    dest: /tmp/otel-values.yaml
    mode: "0644"

- name: Add OpenTelemetry Helm repository
  become: true
  become_user: jenkins
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  command: >
    helm repo add open-telemetry
    https://open-telemetry.github.io/opentelemetry-helm-charts
  register: otel_repo
  changed_when: "'already exists' not in otel_repo.stderr"
  failed_when: false

- name: Update Helm repositories
  become: true
  become_user: jenkins
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  command: helm repo update

- name: Install OpenTelemetry Collector
  become: true
  become_user: jenkins
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  command: >
    helm upgrade --install otel-collector
    open-telemetry/opentelemetry-collector
    --namespace observability
    --create-namespace
    -f /tmp/otel-values.yaml
    --wait
    --timeout 10m

- name: Verify OpenTelemetry Collector
  become: true
  become_user: jenkins
  environment:
    KUBECONFIG: /var/lib/jenkins/.kube/config
  command: kubectl get pods -n observability
  register: otel_pods
  changed_when: false

- name: Show Collector status
  debug:
    var: otel_pods.stdout_lines
