---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Java
  apt:
    name:
      - fontconfig
      - openjdk-21-jre
    state: present

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Jenkins 2026 signing key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: "0644"
    force: yes

- name: Remove old Jenkins repository files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/jenkins.list
    - /etc/apt/sources.list.d/jenkins.sources

- name: Add Jenkins repository
  copy:
    dest: /etc/apt/sources.list.d/jenkins.list
    content: |
      deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/
    mode: "0644"

- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Jenkins
  apt:
    name: jenkins
    state: present

- name: Enable and start Jenkins
  systemd:
    name: jenkins
    state: started
    enabled: yes

- name: Add jenkins user to docker group
  user:
    name: jenkins
    groups: docker
    append: yes

- name: Restart Jenkins
  systemd:
    name: jenkins
    state: restarted

- name: Wait for Jenkins to initialize
  wait_for:
    path: /var/lib/jenkins/secrets/initialAdminPassword
    timeout: 300

- name: Read Jenkins initial admin password
  slurp:
    src: /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_admin_password

- name: Get Jenkins server IP
  command: hostname -I
  register: jenkins_ip
  changed_when: false

- name: Display Jenkins information
  debug:
    msg:
      - "======================================================="
      - "Jenkins has been installed successfully."
      - "Jenkins URL      : http://{{ jenkins_ip.stdout.split()[0] }}:8080"
      - "Username         : admin"
      - "Admin Password   : {{ jenkins_admin_password.content | b64decode | trim }}"
      - "======================================================="
